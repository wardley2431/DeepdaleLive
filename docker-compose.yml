services:
  deepdalelive:
    build: .
    container_name: deepdalelive
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      CLASSROOM_HOST: 0.0.0.0
      CLASSROOM_PORT: 8000
      CLASSROOM_DATA_DIR: /data
    volumes:
      - deepdalelive-data:/data

volumes:
  deepdalelive-data:
